<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6efe9">
  <title>Nathalie & Laurent — Livre d’or</title>

  <style>
    :root {
      --ivory: #fffaf5;
      --ivory-soft: #f7efe8;
      --rose: #b77a82;
      --rose-dark: #76505b;
      --sage: #809482;
      --sage-light: #c7d2c4;
      --gold: #c6a15b;
      --ink: #46363d;
      --muted: #7d6a72;
      --shadow: 0 22px 55px rgba(81, 57, 67, 0.15);
      --header-height: clamp(150px, 22vh, 230px);
      --footer-height: clamp(48px, 6vh, 68px);
      --card-gap: clamp(20px, 2.8vh, 34px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      position: relative;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(199, 210, 196, 0.38), transparent 24%),
        radial-gradient(circle at 88% 86%, rgba(183, 122, 130, 0.22), transparent 28%),
        linear-gradient(145deg, #fffdf9 0%, #f8f0e9 52%, #f3e7e3 100%);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before,
    body::after {
      position: fixed;
      z-index: 0;
      width: min(36vw, 460px);
      height: min(36vw, 460px);
      content: "";
      border: 1px solid rgba(198, 161, 91, 0.25);
      border-radius: 50%;
      pointer-events: none;
    }

    body::before {
      top: -20vw;
      left: -17vw;
    }

    body::after {
      right: -18vw;
      bottom: -21vw;
    }

    .page {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: var(--header-height) minmax(0, 1fr) var(--footer-height);
      width: 100%;
      height: 100%;
    }

    .page-header {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 24px 12px;
      text-align: center;
    }

    .botanical {
      position: absolute;
      top: 18px;
      width: min(26vw, 310px);
      height: 104px;
      opacity: 0.72;
      pointer-events: none;
    }

    .botanical-left {
      left: 3vw;
      transform: rotate(-4deg);
    }

    .botanical-right {
      right: 3vw;
      transform: scaleX(-1) rotate(-4deg);
    }

    .botanical path,
    .botanical ellipse {
      fill: none;
      stroke: var(--sage);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .botanical .flower {
      stroke: var(--rose);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font: 700 clamp(0.72rem, 1.2vw, 0.95rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .page-title {
      margin: 0;
      color: var(--rose-dark);
      font-size: clamp(3rem, 7.4vw, 7rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0.015em;
      text-shadow: 0 8px 25px rgba(118, 80, 91, 0.11);
    }

    .page-subtitle {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 17px 0 0;
      color: var(--muted);
      font: 500 clamp(0.88rem, 1.55vw, 1.28rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.19em;
      text-transform: uppercase;
    }

    .page-subtitle::before,
    .page-subtitle::after {
      width: clamp(36px, 7vw, 90px);
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .page-subtitle::after {
      transform: scaleX(-1);
    }

    .messages-window {
      position: relative;
      min-height: 0;
      width: min(94vw, 1220px);
      margin: 0 auto;
      overflow: hidden;
      border-radius: 34px;
      mask-image: linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
    }

    .messages-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      will-change: transform;
    }

    .messages-group {
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
      width: 100%;
      padding: clamp(42px, 7vh, 74px) 12px;
    }

    .message-card {
      position: relative;
      width: min(92%, 960px);
      margin: 0 auto;
      padding: clamp(25px, 3.2vw, 42px) clamp(26px, 4vw, 52px);
      overflow: hidden;
      background: rgba(255, 250, 245, 0.92);
      border: 1px solid rgba(198, 161, 91, 0.34);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .message-card::before {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      content: "";
      background: linear-gradient(var(--sage-light), var(--rose));
    }

    .message-card::after {
      position: absolute;
      top: 18px;
      right: 24px;
      color: rgba(183, 122, 130, 0.19);
      content: "❦";
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1;
    }

    .guest-name {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      color: var(--rose-dark);
      font: 700 clamp(1.1rem, 2vw, 1.55rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.035em;
    }

    .guest-message {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.32rem, 2.5vw, 2.15rem);
      line-height: 1.48;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .waiting-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .waiting-state[hidden] {
      display: none;
    }

    .waiting-card {
      width: min(92%, 760px);
      padding: clamp(34px, 6vw, 64px);
      background: rgba(255, 250, 245, 0.94);
      border: 1px solid rgba(198, 161, 91, 0.36);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }

    .waiting-symbol {
      margin: 0 0 12px;
      color: var(--rose);
      font-size: clamp(2.1rem, 4vw, 3.4rem);
    }

    .waiting-title {
      margin: 0 0 12px;
      color: var(--rose-dark);
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 400;
    }

    .waiting-text {
      margin: 0;
      color: var(--muted);
      font: 400 clamp(1rem, 2vw, 1.35rem) Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }

    .latest-overlay {
      position: fixed;
      inset: var(--header-height) 0 var(--footer-height);
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(70, 54, 61, 0.36);
      opacity: 0;
      visibility: hidden;
      transition: opacity 420ms ease, visibility 420ms ease;
      pointer-events: none;
    }

    .latest-overlay.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .latest-card {
      position: relative;
      width: min(92vw, 900px);
      max-height: 80%;
      padding: clamp(34px, 5vw, 60px);
      overflow: auto;
      text-align: center;
      background: rgba(255, 250, 245, 0.98);
      border: 1px solid rgba(198, 161, 91, 0.5);
      border-radius: 34px;
      box-shadow: 0 30px 85px rgba(70, 54, 61, 0.28);
    }

    .latest-card::before,
    .latest-card::after {
      position: absolute;
      top: 20px;
      color: rgba(128, 148, 130, 0.45);
      content: "❦";
      font-size: 2.2rem;
    }

    .latest-card::before {
      left: 24px;
    }

    .latest-card::after {
      right: 24px;
      transform: scaleX(-1);
    }

    .latest-label {
      margin: 0 0 18px;
      color: var(--gold);
      font: 700 clamp(0.82rem, 1.3vw, 1rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .latest-name {
      margin: 0 0 16px;
      color: var(--rose-dark);
      font: 700 clamp(1.25rem, 2.4vw, 1.9rem) Arial, Helvetica, sans-serif;
    }

    .latest-message {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.55rem, 3.2vw, 2.8rem);
      line-height: 1.42;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .page-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 20px 14px;
      color: var(--muted);
      font: 600 clamp(0.9rem, 1.5vw, 1.1rem) Arial, Helvetica, sans-serif;
      letter-spacing: 0.04em;
    }

    .status-text {
      margin: 0;
    }

    .status-text.is-error {
      color: #9b5360;
    }

    @media (max-width: 760px) {
      :root {
        --header-height: 132px;
        --footer-height: 50px;
        --card-gap: 16px;
      }

      .botanical {
        display: none;
      }

      .page-header {
        padding-inline: 12px;
      }

      .eyebrow {
        margin-bottom: 5px;
        font-size: 0.64rem;
      }

      .page-title {
        font-size: clamp(2.35rem, 12vw, 3.8rem);
      }

      .page-subtitle {
        gap: 8px;
        margin-top: 10px;
        font-size: 0.74rem;
        letter-spacing: 0.11em;
      }

      .page-subtitle::before,
      .page-subtitle::after {
        width: 22px;
      }

      .messages-window {
        width: 97vw;
        border-radius: 24px;
      }

      .messages-group {
        padding: 30px 4px;
      }

      .message-card {
        width: 95%;
        padding: 21px 24px 21px 28px;
        border-radius: 21px;
      }

      .message-card::after {
        top: 12px;
        right: 15px;
      }

      .guest-message {
        font-size: 1.22rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .messages-window {
        mask-image: none;
        -webkit-mask-image: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <svg class="botanical botanical-left" viewBox="0 0 320 110" aria-hidden="true">
        <path d="M10 95 C70 92, 88 54, 145 50 C205 45, 222 18, 308 14" />
        <path d="M72 77 C55 60, 53 43, 62 29" />
        <ellipse cx="56" cy="48" rx="13" ry="5" transform="rotate(-52 56 48)" />
        <ellipse cx="76" cy="65" rx="14" ry="5" transform="rotate(22 76 65)" />
        <path d="M146 50 C132 34, 131 17, 142 7" />
        <ellipse cx="138" cy="27" rx="13" ry="5" transform="rotate(-61 138 27)" />
        <ellipse cx="163" cy="43" rx="14" ry="5" transform="rotate(18 163 43)" />
        <path d="M232 31 C219 20, 220 8, 229 2" />
        <ellipse cx="225" cy="15" rx="12" ry="5" transform="rotate(-58 225 15)" />
        <path class="flower" d="M110 61 C103 49, 107 40, 116 39 C122 29, 135 34, 135 44 C146 44, 151 56, 143 64 C138 73, 124 72, 120 65 C116 69, 112 67, 110 61 Z" />
      </svg>

      <svg class="botanical botanical-right" viewBox="0 0 320 110" aria-hidden="true">
        <path d="M10 95 C70 92, 88 54, 145 50 C205 45, 222 18, 308 14" />
        <path d="M72 77 C55 60, 53 43, 62 29" />
        <ellipse cx="56" cy="48" rx="13" ry="5" transform="rotate(-52 56 48)" />
        <ellipse cx="76" cy="65" rx="14" ry="5" transform="rotate(22 76 65)" />
        <path d="M146 50 C132 34, 131 17, 142 7" />
        <ellipse cx="138" cy="27" rx="13" ry="5" transform="rotate(-61 138 27)" />
        <ellipse cx="163" cy="43" rx="14" ry="5" transform="rotate(18 163 43)" />
        <path d="M232 31 C219 20, 220 8, 229 2" />
        <ellipse cx="225" cy="15" rx="12" ry="5" transform="rotate(-58 225 15)" />
        <path class="flower" d="M110 61 C103 49, 107 40, 116 39 C122 29, 135 34, 135 44 C146 44, 151 56, 143 64 C138 73, 124 72, 120 65 C116 69, 112 67, 110 61 Z" />
      </svg>

      <p class="eyebrow">Notre mariage</p>
      <h1 class="page-title">Nathalie &amp; Laurent</h1>
      <p class="page-subtitle">Livre d’or des invités</p>
    </header>

    <section id="messagesWindow" class="messages-window" aria-live="polite" aria-label="Messages du livre d’or">
      <div id="messagesTrack" class="messages-track"></div>

      <div id="waitingState" class="waiting-state">
        <div class="waiting-card">
          <p class="waiting-symbol">❦</p>
          <h2 class="waiting-title">Bienvenue dans notre livre d’or</h2>
          <p class="waiting-text">Les doux mots de nos invités apparaîtront ici après leur envoi.</p>
        </div>
      </div>
    </section>

    <footer class="page-footer">
      <p id="statusText" class="status-text">Chargement des messages…</p>
    </footer>
  </main>

  <div id="latestOverlay" class="latest-overlay" aria-hidden="true">
    <article class="latest-card">
      <p class="latest-label">Un nouveau mot pour les mariés</p>
      <h2 id="latestName" class="latest-name"></h2>
      <p id="latestMessage" class="latest-message"></p>
    </article>
  </div>

  <script>
    "use strict";

    const CSV_URL = "https://docs.google.com/spreadsheets/d/16SW6DNNBQmxqe86HVTJGerULGupAIOXP9ZQ1DHJmzcs/gviz/tq?tqx=out:csv&gid=1981975631";
    const MODERATION_ENABLED = false;
    const REFRESH_INTERVAL_MS = 8000;
    const FETCH_TIMEOUT_MS = 7000;
    const LATEST_MESSAGE_DISPLAY_MS = 6500;
    const SCROLL_SPEED_PX_PER_SECOND = 24;

    const messagesWindow = document.getElementById("messagesWindow");
    const messagesTrack = document.getElementById("messagesTrack");
    const waitingState = document.getElementById("waitingState");
    const statusText = document.getElementById("statusText");
    const latestOverlay = document.getElementById("latestOverlay");
    const latestName = document.getElementById("latestName");
    const latestMessage = document.getElementById("latestMessage");

    let isLoading = false;
    let lastSignature = "";
    let currentMessages = [];
    let animationFrameId = null;
    let animationSetupFrameId = null;
    let resizeTimerId = null;
    let latestMessageTimerId = null;
    let scrollOffset = 0;
    let loopHeight = 0;
    let previousFrameTime = null;

    function parseCsv(csvText) {
      const rows = [];
      let row = [];
      let field = "";
      let insideQuotes = false;

      for (let index = 0; index < csvText.length; index += 1) {
        const character = csvText[index];
        const nextCharacter = csvText[index + 1];

        if (insideQuotes) {
          if (character === '"' && nextCharacter === '"') {
            field += '"';
            index += 1;
          } else if (character === '"') {
            insideQuotes = false;
          } else {
            field += character;
          }
        } else if (character === '"') {
          insideQuotes = true;
        } else if (character === ",") {
          row.push(field);
          field = "";
        } else if (character === "\n") {
          row.push(field);
          rows.push(row);
          row = [];
          field = "";
        } else if (character !== "\r") {
          field += character;
        }
      }

      row.push(field);
      if (row.length > 1 || row[0] !== "") {
        rows.push(row);
      }

      return rows;
    }

    function normalizeCell(value) {
      return String(value ?? "").replace(/^\uFEFF/, "").trim();
    }

    function makeStableId(timestamp, name, message) {
      return `${timestamp}\u241f${name}\u241f${message}`;
    }

    function rowsToMessages(rows) {
      if (rows.length === 0) {
        return [];
      }

      const firstRow = rows[0].map((cell) => normalizeCell(cell).toLowerCase());
      const hasHeader = firstRow.some((cell) =>
        cell.includes("horodatage") ||
        cell.includes("prénom") ||
        cell === "nom" ||
        cell.includes("message") ||
        cell.includes("validation")
      );

      const dataRows = hasHeader ? rows.slice(1) : rows;

      return dataRows
        .map((columns) => {
          const timestamp = normalizeCell(columns[0]);
          const name = normalizeCell(columns[1]);
          const message = normalizeCell(columns[2]);
          const validation = normalizeCell(columns[3]).toUpperCase();

          return {
            id: makeStableId(timestamp, name, message),
            timestamp,
            name: name || "Un invité",
            message,
            validation
          };
        })
        .filter((entry) => entry.message !== "")
        .filter((entry) => !MODERATION_ENABLED || entry.validation === "OUI");
    }

    function createMessageCard(messageData) {
      const card = document.createElement("article");
      card.className = "message-card";

      const nameElement = document.createElement("h2");
      nameElement.className = "guest-name";
      nameElement.textContent = messageData.name;

      const messageElement = document.createElement("p");
      messageElement.className = "guest-message";
      messageElement.textContent = messageData.message;

      card.append(nameElement, messageElement);
      return card;
    }

    function createMessagesGroup(messages, isDuplicate) {
      const group = document.createElement("div");
      group.className = "messages-group";

      if (isDuplicate) {
        group.dataset.duplicate = "true";
        group.setAttribute("aria-hidden", "true");
      }

      messages.forEach((messageData) => {
        group.appendChild(createMessageCard(messageData));
      });

      return group;
    }

    function stopScrollAnimation() {
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      if (animationSetupFrameId !== null) {
        cancelAnimationFrame(animationSetupFrameId);
        animationSetupFrameId = null;
      }

      previousFrameTime = null;
    }

    function animateScroll(frameTime) {
      if (previousFrameTime === null) {
        previousFrameTime = frameTime;
      }

      const elapsedSeconds = Math.min((frameTime - previousFrameTime) / 1000, 0.1);
      previousFrameTime = frameTime;
      scrollOffset += SCROLL_SPEED_PX_PER_SECOND * elapsedSeconds;

      if (loopHeight > 0 && scrollOffset >= loopHeight) {
        scrollOffset %= loopHeight;
      }

      messagesTrack.style.transform = `translate3d(0, ${-scrollOffset}px, 0)`;
      animationFrameId = requestAnimationFrame(animateScroll);
    }

    function startScrollAnimation() {
      stopScrollAnimation();
      messagesTrack.querySelectorAll('[data-duplicate="true"]').forEach((element) => element.remove());
      messagesTrack.style.top = "0";
      messagesTrack.style.transform = "translate3d(0, 0, 0)";
      scrollOffset = 0;
      loopHeight = 0;

      const firstGroup = messagesTrack.querySelector(".messages-group");
      if (!firstGroup || currentMessages.length === 0) {
        return;
      }

      animationSetupFrameId = requestAnimationFrame(() => {
        animationSetupFrameId = null;
        const groupHeight = firstGroup.getBoundingClientRect().height;
        const windowHeight = messagesWindow.clientHeight;

        if (groupHeight <= windowHeight) {
          messagesTrack.style.top = "50%";
          messagesTrack.style.transform = "translate3d(0, -50%, 0)";
          return;
        }

        messagesTrack.appendChild(createMessagesGroup(currentMessages, true));
        loopHeight = groupHeight;
        animationFrameId = requestAnimationFrame(animateScroll);
      });
    }

    function updateStatus(hasError) {
      statusText.classList.toggle("is-error", hasError);

      if (hasError) {
        statusText.textContent = currentMessages.length > 0
          ? `${currentMessages.length} message${currentMessages.length > 1 ? "s" : ""} — actualisation en attente`
          : "Connexion aux messages temporairement indisponible";
        return;
      }

      statusText.textContent = currentMessages.length === 0
        ? "Aucun message pour le moment"
        : `${currentMessages.length} message${currentMessages.length > 1 ? "s" : ""}`;
    }

    function renderMessages(messages) {
      stopScrollAnimation();
      messagesTrack.replaceChildren();
      currentMessages = messages;

      if (messages.length === 0) {
        waitingState.hidden = false;
        messagesTrack.style.top = "0";
        messagesTrack.style.transform = "translate3d(0, 0, 0)";
        updateStatus(false);
        return;
      }

      waitingState.hidden = true;
      messagesTrack.appendChild(createMessagesGroup(messages, false));
      updateStatus(false);
      startScrollAnimation();
    }

    function showLatestMessage(messageData) {
      if (!messageData) {
        return;
      }

      if (latestMessageTimerId !== null) {
        clearTimeout(latestMessageTimerId);
      }

      latestName.textContent = messageData.name;
      latestMessage.textContent = messageData.message;
      latestOverlay.classList.add("is-visible");
      latestOverlay.setAttribute("aria-hidden", "false");

      latestMessageTimerId = window.setTimeout(() => {
        latestOverlay.classList.remove("is-visible");
        latestOverlay.setAttribute("aria-hidden", "true");
        latestMessageTimerId = null;
      }, LATEST_MESSAGE_DISPLAY_MS);
    }

    function buildSignature(messages) {
      return JSON.stringify(messages.map((entry) => [entry.id, entry.validation]));
    }

    async function loadMessages() {
      if (isLoading) {
        return;
      }

      isLoading = true;
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const requestUrl = `${CSV_URL}&t=${Math.floor(Date.now() / REFRESH_INTERVAL_MS)}`;
        const response = await fetch(requestUrl, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error(`Réponse HTTP ${response.status}`);
        }

        const csvText = await response.text();
        const messages = rowsToMessages(parseCsv(csvText));
        const newSignature = buildSignature(messages);

        if (newSignature !== lastSignature) {
          const previousIds = new Set(currentMessages.map((entry) => entry.id));
          const addedMessages = messages.filter((entry) => !previousIds.has(entry.id));
          const isInitialLoad = lastSignature === "";

          lastSignature = newSignature;
          renderMessages(messages);

          if (!isInitialLoad && addedMessages.length > 0) {
            showLatestMessage(addedMessages[addedMessages.length - 1]);
          }
        } else {
          updateStatus(false);
        }
      } catch (error) {
        console.error("Erreur lors du chargement du livre d’or :", error);
        updateStatus(true);
      } finally {
        clearTimeout(timeoutId);
        isLoading = false;
      }
    }

    window.addEventListener("resize", () => {
      if (resizeTimerId !== null) {
        clearTimeout(resizeTimerId);
      }

      resizeTimerId = window.setTimeout(() => {
        startScrollAnimation();
        resizeTimerId = null;
      }, 220);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopScrollAnimation();
      } else {
        startScrollAnimation();
        loadMessages();
      }
    });

    loadMessages();
    window.setInterval(loadMessages, REFRESH_INTERVAL_MS);
  </script>
