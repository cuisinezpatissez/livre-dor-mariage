<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Livre d'or</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#f8e7e7,#fff6f0);
  font-family:Georgia, serif;
  overflow:hidden;
}

header{
  height:145px;
  text-align:center;
  background:linear-gradient(135deg,#f8e7e7,#fff6f0);
  box-shadow:0 10px 25px rgba(248,231,231,0.9);
  position:relative;
  z-index:10;
}

h1{
  color:#c28b54;
  font-size:58px;
  margin:0;
  padding-top:24px;
}

.sous-titre{
  color:#8b5e3c;
  font-size:26px;
  margin-top:4px;
}

#zone{
  height:calc(100vh - 145px);
  overflow:hidden;
  position:relative;
}

#defilement{
  width:94%;
  margin:0 auto;
  will-change:transform;
}

.carte{
  background:white;
  border-radius:24px;
  padding:24px 34px;
  margin:20px 0;
  box-shadow:0 10px 28px rgba(0,0,0,0.14);
}

.nom{
  color:#8b5e3c;
  font-size:30px;
  font-weight:bold;
  margin-bottom:8px;
}

.message{
  color:#222;
  font-size:34px;
  line-height:1.28;
}

.info{
  position:fixed;
  bottom:10px;
  right:22px;
  font-family:Arial, sans-serif;
  color:#9b7a66;
  font-size:15px;
  z-index:20;
}

.scroll{
  animation:scrollContinu linear infinite;
}

@keyframes scrollContinu{
  from{ transform:translateY(0); }
  to{ transform:translateY(var(--distance)); }
}
</style>
</head>

<body>

<header>
  <h1>💗 Nathalie & Laurent 💗</h1>
  <div class="sous-titre">Livre d’or des invités</div>
</header>

<div id="zone">
  <div id="defilement"></div>
</div>

<div class="info" id="info"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjWC39iTfhs66h6IzggGiK4T7zCk1AECayVdBFRviG6zvofKjJUtqk2MTxy2jwRKCbB5VtSQpul0-F/pub?gid=1981975631&single=true&output=csv";

let derniereSignature = "";

function nettoyer(valeur){
  return (valeur || "")
    .replace(/^"|"$/g,"")
    .replace(/""/g,'"')
    .trim();
}

function parserCSVLine(line){
  const result = [];
  let current = "";
  let inQuotes = false;

  for(let i = 0; i < line.length; i++){
    const char = line[i];
    const next = line[i + 1];

    if(char === '"' && inQuotes && next === '"'){
      current += '"';
      i++;
    }else if(char === '"'){
      inQuotes = !inQuotes;
    }else if((char === "," || char === ";") && !inQuotes){
      result.push(current);
      current = "";
    }else{
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parserCSV(text){
  const lignes = text.trim().split(/\r?\n/);
  const resultats = [];

  for(let i = 1; i < lignes.length; i++){
    const colonnes = parserCSVLine(lignes[i]);

    const nom = nettoyer(colonnes[1]);
    const message = nettoyer(colonnes[2]);
    const photo = nettoyer(colonnes[3]);
    const valide = nettoyer(colonnes[4]).toUpperCase();

    if(nom && message && valide === "OUI"){
      resultats.push({nom, message, photo});
    }
  }

  return resultats;
}

function carteHTML(item){
  return `
    <div class="carte">
      <div class="nom">${item.nom}</div>
      <div class="message">“${item.message}”</div>
    </div>
  `;
}

function afficher(messages){
  const zone = document.getElementById("zone");
  const defilement = document.getElementById("defilement");

  const contenuSimple = messages.map(carteHTML).join("");

  defilement.classList.remove("scroll");
  defilement.style.transform = "translateY(0)";
  defilement.innerHTML = "";

  if(messages.length === 0){
    defilement.innerHTML = `
      <div class="carte">
        <div class="nom">Bienvenue</div>
        <div class="message">Les messages validés apparaîtront ici.</div>
      </div>
    `;
    return;
  }

  defilement.innerHTML = contenuSimple;

  requestAnimationFrame(() => {
    const hauteurZone = zone.clientHeight;
    const hauteurContenu = defilement.scrollHeight;

    if(hauteurContenu <= hauteurZone){
      defilement.innerHTML = contenuSimple;
      defilement.classList.remove("scroll");
    }else{
      defilement.innerHTML = contenuSimple + contenuSimple + contenuSimple + contenuSimple;

      const distance = hauteurContenu;
      const duree = Math.max(50, messages.length * 6);

      defilement.style.setProperty("--distance", "-" + distance + "px");
      defilement.style.animationDuration = duree + "s";
      defilement.classList.add("scroll");
    }
  });
}

async function chargerMessages(){
  try{
    const reponse = await fetch(CSV_URL + "&cache=" + Date.now(), {
      cache: "no-store"
    });

    const texte = await reponse.text();
    const messages = parserCSV(texte);

    const signature = JSON.stringify(messages);

    if(signature !== derniereSignature){
      derniereSignature = signature;
      afficher(messages);
    }

    document.getElementById("info").innerText =
      messages.length + " message(s)";
  }catch(e){
    document.getElementById("info").innerText = "Erreur de chargement";
  }
}

chargerMessages();
setInterval(chargerMessages, 15000);
</script>

</body>
</html>
