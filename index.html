<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Livre d’or — Nathalie & Laurent</title>

  <style>
    :root {
      --fond-1: #f8e7e7;
      --fond-2: #fff8f2;
      --or: #bd8751;
      --brun: #80583f;
      --texte: #2d2926;
      --carte: rgba(255, 255, 255, 0.94);
      --hauteur-entete: 150px;
      --fondu: 95px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.9), transparent 32%),
        linear-gradient(135deg, var(--fond-1), var(--fond-2));
      color: var(--texte);
      font-family: Georgia, "Times New Roman", serif;
    }

    header {
      height: var(--hauteur-entete);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 10;
      background: linear-gradient(
        to bottom,
        rgba(255,248,242,.98),
        rgba(248,231,231,.94)
      );
      box-shadow: 0 10px 30px rgba(111, 76, 65, .12);
    }

    h1 {
      margin: 0;
      color: var(--or);
      font-size: clamp(38px, 4vw, 64px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: .5px;
      text-shadow: 0 2px 8px rgba(189, 135, 81, .14);
    }

    .sous-titre {
      margin-top: 10px;
      color: var(--brun);
      font-size: clamp(20px, 1.8vw, 29px);
    }

    #zone {
      position: relative;
      height: calc(100vh - var(--hauteur-entete));
      overflow: hidden;
      isolation: isolate;
    }

    #zone::before,
    #zone::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: var(--fondu);
      z-index: 5;
      pointer-events: none;
    }

    #zone::before {
      top: 0;
      background: linear-gradient(
        to bottom,
        rgba(248,231,231,1),
        rgba(248,231,231,0)
      );
    }

    #zone::after {
      bottom: 0;
      background: linear-gradient(
        to top,
        rgba(255,248,242,1),
        rgba(255,248,242,0)
      );
    }

    #defilement {
      width: min(94%, 1500px);
      margin: 0 auto;
      will-change: transform;
      transform: translate3d(0, 0, 0);
    }

    .groupe {
      padding: 70px 0 90px;
    }

    .carte {
      margin: 24px 0;
      padding: 28px 38px;
      border: 1px solid rgba(189, 135, 81, .10);
      border-radius: 26px;
      background: var(--carte);
      box-shadow:
        0 12px 34px rgba(72, 49, 40, .13),
        inset 0 1px 0 rgba(255,255,255,.85);
      backdrop-filter: blur(4px);
    }

    .nom {
      margin-bottom: 9px;
      color: var(--brun);
      font-size: clamp(25px, 2vw, 34px);
      line-height: 1.15;
      font-weight: 700;
    }

    .message {
      color: var(--texte);
      font-size: clamp(27px, 2.25vw, 39px);
      line-height: 1.32;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .attente {
      min-height: calc(100vh - var(--hauteur-entete));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
      text-align: center;
    }

    .attente .carte {
      width: min(900px, 94%);
    }

    .attente .nom {
      font-size: clamp(32px, 3vw, 48px);
    }

    .attente .message {
      font-size: clamp(24px, 2vw, 34px);
    }

    .info {
      position: fixed;
      right: 20px;
      bottom: 10px;
      z-index: 20;
      color: rgba(128, 88, 63, .72);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .erreur {
      color: #9e3838;
    }

    @media (max-width: 800px) {
      :root {
        --hauteur-entete: 125px;
      }

      .carte {
        padding: 22px 24px;
        border-radius: 20px;
      }

      .groupe {
        padding: 55px 0 75px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #defilement {
        transform: none !important;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>💗 Nathalie &amp; Laurent 💗</h1>
    <div class="sous-titre">Livre d’or des invités</div>
  </header>

  <main id="zone" aria-live="polite">
    <div id="defilement"></div>
  </main>

  <div class="info" id="info">Chargement…</div>

  <script>
    /*
      CONFIGURATION
      --------------------------------------------------------------------
      CSV_URL : URL CSV publiée par Google Sheets.
      RAFRAICHISSEMENT_MS : délai de vérification des nouveaux messages.
      MODERATION_ACTIVE :
        - false = tous les messages valides sont affichés automatiquement ;
        - true  = seuls ceux dont la colonne D contient OUI sont affichés.
    */

    const CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjWC39iTfhs66h6IzggGiK4T7zCk1AECayVdBFRviG6zvofKjJUtqk2MTxy2jwRKCbB5VtSQpul0-F/pub?gid=1981975631&single=true&output=csv";

    const RAFRAICHISSEMENT_MS = 10000;
    const MODERATION_ACTIVE = false;

    const zone = document.getElementById("zone");
    const defilement = document.getElementById("defilement");
    const info = document.getElementById("info");

    let derniereSignature = "";
    let animationId = null;
    let positionY = 0;
    let dernierTemps = null;
    let hauteurBoucle = 0;
    let vitessePixelsSeconde = 42;

    function normaliser(valeur) {
      return String(valeur ?? "").trim();
    }

    /*
      Analyse tout le CSV caractère par caractère.
      Cette méthode accepte :
      - les virgules et points-virgules dans les messages ;
      - les guillemets ;
      - les retours à la ligne dans un message.
    */
    function parserCSV(texte) {
      const lignes = [];
      let ligne = [];
      let cellule = "";
      let entreGuillemets = false;

      for (let i = 0; i < texte.length; i++) {
        const caractere = texte[i];
        const suivant = texte[i + 1];

        if (caractere === '"') {
          if (entreGuillemets && suivant === '"') {
            cellule += '"';
            i++;
          } else {
            entreGuillemets = !entreGuillemets;
          }
          continue;
        }

        if (!entreGuillemets && caractere === ",") {
          ligne.push(cellule);
          cellule = "";
          continue;
        }

        if (!entreGuillemets && (caractere === "\n" || caractere === "\r")) {
          if (caractere === "\r" && suivant === "\n") {
            i++;
          }

          ligne.push(cellule);
          cellule = "";

          if (ligne.some(valeur => normaliser(valeur) !== "")) {
            lignes.push(ligne);
          }

          ligne = [];
          continue;
        }

        cellule += caractere;
      }

      ligne.push(cellule);

      if (ligne.some(valeur => normaliser(valeur) !== "")) {
        lignes.push(ligne);
      }

      if (lignes.length <= 1) {
        return [];
      }

      return lignes.slice(1)
        .map(colonnes => ({
          nom: normaliser(colonnes[1]),
          message: normaliser(colonnes[2]),
          validation: normaliser(colonnes[3]).toUpperCase()
        }))
        .filter(item => {
          if (!item.nom || !item.message) {
            return false;
          }

          return !MODERATION_ACTIVE || item.validation === "OUI";
        });
    }

    function creerCarte(item) {
      const carte = document.createElement("article");
      carte.className = "carte";

      const nom = document.createElement("div");
      nom.className = "nom";
      nom.textContent = item.nom;

      const message = document.createElement("div");
      message.className = "message";
      message.textContent = `“${item.message}”`;

      carte.append(nom, message);
      return carte;
    }

    function creerGroupe(messages) {
      const groupe = document.createElement("section");
      groupe.className = "groupe";

      for (const item of messages) {
        groupe.appendChild(creerCarte(item));
      }

      return groupe;
    }

    function arreterAnimation() {
      if (animationId !== null) {
        cancelAnimationFrame(animationId);
      }

      animationId = null;
      dernierTemps = null;
    }

    function animer(temps) {
      if (dernierTemps === null) {
        dernierTemps = temps;
      }

      const deltaSecondes = Math.min((temps - dernierTemps) / 1000, 0.1);
      dernierTemps = temps;

      positionY -= vitessePixelsSeconde * deltaSecondes;

      if (Math.abs(positionY) >= hauteurBoucle) {
        positionY += hauteurBoucle;
      }

      defilement.style.transform =
        `translate3d(0, ${positionY.toFixed(2)}px, 0)`;

      animationId = requestAnimationFrame(animer);
    }

    function afficherAttente() {
      arreterAnimation();
      positionY = 0;
      defilement.style.transform = "translate3d(0,0,0)";
      defilement.replaceChildren();

      const attente = document.createElement("section");
      attente.className = "attente";

      const carte = document.createElement("article");
      carte.className = "carte";

      const nom = document.createElement("div");
      nom.className = "nom";
      nom.textContent = "Bienvenue à notre mariage";

      const message = document.createElement("div");
      message.className = "message";
      message.textContent =
        "Scannez le QR code, écrivez votre message et retrouvez-le bientôt sur cet écran.";

      carte.append(nom, message);
      attente.appendChild(carte);
      defilement.appendChild(attente);
    }

    function afficher(messages) {
      arreterAnimation();
      positionY = 0;
      defilement.style.transform = "translate3d(0,0,0)";
      defilement.replaceChildren();

      if (messages.length === 0) {
        afficherAttente();
        return;
      }

      const premierGroupe = creerGroupe(messages);
      defilement.appendChild(premierGroupe);

      /*
        Une copie identique est placée à la suite de la première.
        Quand la première copie est entièrement sortie, la position revient
        au début de façon invisible : la boucle paraît continue.
      */
      const secondGroupe = creerGroupe(messages);
      secondGroupe.setAttribute("aria-hidden", "true");
      defilement.appendChild(secondGroupe);

      requestAnimationFrame(() => {
        hauteurBoucle = premierGroupe.getBoundingClientRect().height;

        /*
          La vitesse reste confortable, même avec beaucoup de messages.
          Un grand nombre de messages accélère légèrement la boucle, sans
          rendre la lecture difficile.
        */
        vitessePixelsSeconde = Math.min(
          58,
          Math.max(34, 34 + messages.length * 0.8)
        );

        /*
          Le premier contenu démarre sous l'écran afin de produire un effet
          de véritable générique de fin.
        */
        positionY = zone.clientHeight;
        dernierTemps = null;
        animationId = requestAnimationFrame(animer);
      });
    }

    async function chargerMessages() {
      try {
        const separateur = CSV_URL.includes("?") ? "&" : "?";
        const urlSansCache =
          `${CSV_URL}${separateur}cache=${Date.now()}`;

        const reponse = await fetch(urlSansCache, {
          method: "GET",
          cache: "no-store"
        });

        if (!reponse.ok) {
          throw new Error(`Erreur HTTP ${reponse.status}`);
        }

        const texte = await reponse.text();
        const messages = parserCSV(texte);
        const signature = JSON.stringify(messages);

        if (signature !== derniereSignature) {
          derniereSignature = signature;
          afficher(messages);
        }

        info.classList.remove("erreur");
        info.textContent =
          `${messages.length} message${messages.length > 1 ? "s" : ""}`;
      } catch (erreur) {
        console.error(erreur);
        info.classList.add("erreur");
        info.textContent = "Connexion aux messages impossible";
      }
    }

    window.addEventListener("resize", () => {
      /*
        Le prochain chargement reconstruit la boucle avec les nouvelles
        dimensions. On force ici la mise à jour.
      */
      derniereSignature = "";
      chargerMessages();
    });

    chargerMessages();
    setInterval(chargerMessages, RAFRAICHISSEMENT_MS);
  </script>
</body>
</html>
