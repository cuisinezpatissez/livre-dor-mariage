<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Livre d'or</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#f8e7e7,#fff6f0);
  font-family:Georgia, serif;
  overflow:hidden;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:145px;
  background:linear-gradient(135deg,#f8e7e7,#fff6f0);
  z-index:10;
  text-align:center;
  box-shadow:0 10px 25px rgba(248,231,231,0.9);
}

h1{
  color:#c28b54;
  font-size:58px;
  margin:28px 0 4px;
}

.sous-titre{
  color:#8b5e3c;
  font-size:26px;
}

#zone{
  position:absolute;
  top:150px;
  left:0;
  width:100%;
  height:calc(100vh - 150px);
  overflow:hidden;
}

#defilement{
  position:absolute;
  width:92%;
  left:4%;
  animation:scrollCinema linear infinite;
}

.carte{
  background:white;
  border-radius:24px;
  padding:26px 34px;
  margin-bottom:24px;
  box-shadow:0 10px 28px rgba(0,0,0,0.14);
}

.nom{
  color:#8b5e3c;
  font-size:30px;
  font-weight:bold;
  margin-bottom:10px;
}

.message{
  color:#222;
  font-size:34px;
  line-height:1.30;
}

.info{
  position:fixed;
  bottom:12px;
  right:22px;
  font-family:Arial, sans-serif;
  color:#9b7a66;
  font-size:15px;
  z-index:20;
}

@keyframes scrollCinema{
  from{
    transform:translateY(100vh);
  }
  to{
    transform:translateY(-100%);
  }
}
</style>
</head>

<body>

<header>
  <h1>💗 Nathalie & Laurent 💗</h1>
  <div class="sous-titre">Livre d’or des invités</div>
</header>

<div id="zone">
  <div id="defilement"></div>
</div>

<div class="info" id="info"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjWC39iTfhs66h6IzggGiK4T7zCk1AECayVdBFRviG6zvofKjJUtqk2MTxy2jwRKCbB5VtSQpul0-F/pub?gid=0&single=true&output=csv";

function parserCSV(text){
  const lignes = text.trim().split(/\r?\n/);
  const resultats = [];

  for(let i = 1; i < lignes.length; i++){
    const colonnes = lignes[i].match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g) || [];

    const nom = (colonnes[0] || "").replace(/^"|"$/g,"").trim();
    const message = (colonnes[1] || "").replace(/^"|"$/g,"").trim();
    const valide = (colonnes[2] || "").replace(/^"|"$/g,"").trim().toUpperCase();

    if(nom && message && valide === "OUI"){
      resultats.push({nom, message});
    }
  }

  return resultats;
}

async function chargerMessages(){
  try{
    const reponse = await fetch(CSV_URL + "&cache=" + Date.now());
    const texte = await reponse.text();
    const messages = parserCSV(texte);

    const defilement = document.getElementById("defilement");
    defilement.innerHTML = "";

    messages.forEach(item => {
      const carte = document.createElement("div");
      carte.className = "carte";
      carte.innerHTML = `
        <div class="nom">${item.nom}</div>
        <div class="message">“${item.message}”</div>
      `;
      defilement.appendChild(carte);
    });

    const duree = Math.max(45, messages.length * 8);
    defilement.style.animationDuration = duree + "s";

    document.getElementById("info").innerText =
      messages.length + " message(s)";
  }catch(e){
    document.getElementById("info").innerText = "Erreur de chargement";
  }
}

chargerMessages();
setInterval(chargerMessages, 30000);
</script>

</body>
</html>
