<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Livre d'or</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#f8e7e7,#fff6f0);
  font-family:Georgia, serif;
  overflow:hidden;
}

h1{
  text-align:center;
  color:#c28b54;
  font-size:58px;
  margin:28px 0 6px;
}

.sous-titre{
  text-align:center;
  color:#8b5e3c;
  font-size:26px;
  margin-bottom:24px;
}

#mur{
  width:92%;
  height:76vh;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  grid-template-rows:repeat(4, 1fr);
  gap:20px;
}

.carte{
  background:white;
  border-radius:24px;
  padding:22px 26px;
  box-shadow:0 10px 28px rgba(0,0,0,0.14);
  animation:apparition 0.8s ease;
  overflow:hidden;
}

.nom{
  color:#8b5e3c;
  font-size:27px;
  font-weight:bold;
  margin-bottom:10px;
}

.message{
  color:#222;
  font-size:28px;
  line-height:1.25;
}

.info{
  position:fixed;
  bottom:12px;
  right:22px;
  font-family:Arial, sans-serif;
  color:#9b7a66;
  font-size:15px;
}

@keyframes apparition{
  from{opacity:0; transform:translateY(18px);}
  to{opacity:1; transform:translateY(0);}
}

@media (max-width:900px){
  #mur{
    grid-template-columns:1fr;
    grid-template-rows:repeat(4, 1fr);
  }

  h1{
    font-size:42px;
  }

  .message{
    font-size:24px;
  }
}
</style>
</head>

<body>

<h1>💗 Nathalie & Laurent 💗</h1>
<div class="sous-titre">Livre d’or des invités</div>

<div id="mur"></div>
<div class="info" id="info"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjWC39iTfhs66h6IzggGiK4T7zCk1AECayVdBFRviG6zvofKjJUtqk2MTxy2jwRKCbB5VtSQpul0-F/pub?gid=0&single=true&output=csv";

let tousLesMessages = [];
let pageActuelle = 0;
const messagesParPage = 8;

function parserCSV(text){
  const lignes = text.trim().split(/\r?\n/);
  const resultats = [];

  for(let i = 1; i < lignes.length; i++){
    const colonnes = lignes[i].match(/(".*?"|[^",;]+)(?=\s*[,;]|\s*$)/g) || [];

    const nom = (colonnes[0] || "").replace(/^"|"$/g,"").trim();
    const message = (colonnes[1] || "").replace(/^"|"$/g,"").trim();
    const valide = (colonnes[2] || "").replace(/^"|"$/g,"").trim().toUpperCase();

    if(nom && message && valide === "OUI"){
      resultats.push({nom, message});
    }
  }

  return resultats.reverse();
}

async function chargerMessages(){
  try{
    const reponse = await fetch(CSV_URL + "&cache=" + Date.now());
    const texte = await reponse.text();
    tousLesMessages = parserCSV(texte);

    if(tousLesMessages.length > 0){
      afficherPage();
    }

    document.getElementById("info").innerText =
      tousLesMessages.length + " message(s)";
  }catch(e){
    document.getElementById("info").innerText = "Erreur de chargement";
  }
}

function afficherPage(){
  const mur = document.getElementById("mur");
  mur.innerHTML = "";

  if(tousLesMessages.length === 0){
    mur.innerHTML = `
      <div class="carte">
        <div class="nom">Bienvenue</div>
        <div class="message">Les messages apparaîtront ici.</div>
      </div>
    `;
    return;
  }

  const debut = pageActuelle * messagesParPage;
  const fin = debut + messagesParPage;
  let groupe = tousLesMessages.slice(debut, fin);

  groupe.forEach(item => {
    const carte = document.createElement("div");
    carte.className = "carte";
    carte.innerHTML = `
      <div class="nom">${item.nom}</div>
      <div class="message">“${item.message}”</div>
    `;
    mur.appendChild(carte);
  });

  pageActuelle++;

  if(pageActuelle * messagesParPage >= tousLesMessages.length){
    pageActuelle = 0;
  }
}

chargerMessages();

setInterval(chargerMessages, 8000);
setInterval(afficherPage, 10000);
</script>

</body>
</html>
